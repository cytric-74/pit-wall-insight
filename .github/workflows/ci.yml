name: CI

# Runs lint + typecheck + test for each of apps/backend, apps/ingestion, and
# apps/frontend on every push/PR touching main — before this workflow every
# guarantee in the Phase 7 audit (mypy --strict, ruff, pytest, the Vitest
# suite) depended on someone remembering to run these commands by hand
# (Phase 7 audit, High).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: mypy --strict .
      - run: pytest -q

  ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/ingestion/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: mypy --strict .
      # Excludes @pytest.mark.network tests by default (see pyproject.toml's
      # addopts) — this workflow never makes a real network call.
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck test --filter=@pit-wall-insight/frontend...
