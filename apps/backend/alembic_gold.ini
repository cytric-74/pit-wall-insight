[alembic]
script_location = alembic_gold
prepend_sys_path = .
path_separator = os
version_path_separator = os

# sqlalchemy.url is intentionally omitted here — alembic_gold/env.py builds
# it from Settings (app.core.config), specifically
# `analytics_sqlalchemy_database_uri`, so there is exactly one source of
# truth for the database URL. Run with `alembic -c alembic_gold.ini
# <command>` — plain `alembic <command>` uses `alembic.ini` (the raw/Bronze
# database) instead.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
